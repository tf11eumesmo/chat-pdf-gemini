<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  
  <!-- Título da aba com emoji -->
  <title>Respondendo questões</title>
  
  <!-- Favicon com emoji 📚 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #fff; 
    }
    
    /* Container do iframe */
    .iframe-container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
    }
    
    /* Iframe do Streamlit */
    #streamlit-frame { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block; 
    }
    
    /* ========== OVERLAYS PARA BLOQUEAR ELEMENTOS ========== */
    
    /* 1. Botão "Gerenciar aplicativo" (canto superior direito) */
    .top-right-blocker {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 220px;
      height: 45px;
      background: transparent;
      z-index: 9999;
      pointer-events: auto;
      border-radius: 6px;
    }
    
    /* 2. Overlay ÚNICO em toda a base inferior (bloqueia cliques) */
    .bottom-bar-blocker {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 50px;
      background: #ffffff;
      z-index: 9999;
      pointer-events: auto;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
    }
    
    /* ========== LOADER ========== */
    .loader {
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%;
      background: #fff; 
      display: flex; 
      align-items: center; 
      justify-content: center;
      z-index: 10000;
    }
    .loader.hidden { display: none; }
    .spinner {
      width: 32px; 
      height: 32px; 
      border: 3px solid #e0e0e0;
      border-top-color: #28a745; 
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 
      to { transform: rotate(360deg); } 
    }
    
    /* ========== MENSAGEM DE ERRO ========== */
    .error-msg {
      position: fixed; 
      top: 50%; 
      left: 50%; 
      transform: translate(-50%, -50%);
      background: #ffebee; 
      color: #c62828; 
      padding: 12px 20px;
      border-radius: 6px; 
      border-left: 4px solid #c62828;
      max-width: 350px; 
      text-align: center; 
      display: none; 
      z-index: 10001;
      font-size: 13px;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <!-- Loader (spinner sem texto) -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>
  
  <!-- Mensagem de erro -->
  <div class="error-msg" id="error-msg">
    Não foi possível carregar.<br><small>Recarregue a página.</small>
  </div>
  
  <!-- Container principal -->
  <div class="iframe-container">
    <!-- Iframe do Streamlit -->
    <iframe 
      id="streamlit-frame" 
      src="https://iadobizurado.streamlit.app?embed=true&embed_options=disable_scrolling" 
      title="Respondendo questões"
      loading="lazy"
    ></iframe>
    
    <!-- Overlay: botão "Gerenciar aplicativo" -->
    <div class="top-right-blocker"></div>
    
    <!-- Overlay ÚNICO: toda a base inferior (bloqueia Fullscreen + Built with Streamlit) -->
    <div class="bottom-bar-blocker"></div>
  </div>

  <!-- Scripts -->
  <script>
    const iframe = document.getElementById('streamlit-frame');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('error-msg');
    
    // Esconder loader quando iframe carregar
    iframe.addEventListener('load', () => {
      setTimeout(() => loader.classList.add('hidden'), 500);
    });
    
    // Timeout para erro (12 segundos)
    setTimeout(() => {
      if (!loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        errorMsg.classList.add('show');
      }
    }, 12000);
    
    // Handler de erro
    iframe.addEventListener('error', () => {
      loader.classList.add('hidden');
      errorMsg.classList.add('show');
    });
  </script>
</body>
</html>
