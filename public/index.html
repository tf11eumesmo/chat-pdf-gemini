<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Respondendo questões</title>
  
  <!-- Favicon com emoji 📚 -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; 
      height: 100%; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
      background: #fff; 
      /* REMOVIDO overflow: hidden para permitir scroll no iframe */
    }
    
    .iframe-container { 
      position: relative; 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden;
    }
    
    /* Iframe com scroll habilitado */
    #streamlit-frame { 
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block; 
      overflow: auto !important;
      -webkit-overflow-scrolling: touch; /* Smooth scroll no iOS */
    }
    
    /* Força exibição da scrollbar no iframe */
    #streamlit-frame::-webkit-scrollbar {
      width: 10px !important;
      height: 10px !important;
    }
    #streamlit-frame::-webkit-scrollbar-track {
      background: #f1f1f1 !important;
    }
    #streamlit-frame::-webkit-scrollbar-thumb {
      background: #888 !important;
      border-radius: 5px !important;
    }
    #streamlit-frame::-webkit-scrollbar-thumb:hover {
      background: #555 !important;
    }
    
    /* Overlays de bloqueio */
    .top-right-blocker {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 220px;
      height: 45px;
      background: transparent;
      z-index: 9999;
      pointer-events: auto;
      border-radius: 6px;
    }
    
    .bottom-bar-blocker {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 50px;
      background: #ffffff;
      z-index: 9999;
      pointer-events: auto;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.05);
    }
    
    /* Loader e erro */
    .loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .loader.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #28a745; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .error-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #ffebee; color: #c62828; padding: 12px 20px;
      border-radius: 6px; border-left: 4px solid #c62828;
      max-width: 350px; text-align: center; display: none; z-index: 10001;
      font-size: 13px;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <div class="error-msg" id="error-msg">Não foi possível carregar.<br><small>Recarregue a página.</small></div>
  
  <div class="iframe-container">
    <!-- Iframe SEM disable_scrolling e com permissões completas -->
    <iframe 
      id="streamlit-frame" 
      src="https://iadobizurado.streamlit.app?embed=true" 
      title="Respondendo questões"
      loading="lazy"
      scrolling="yes"
      allow="fullscreen; camera; microphone; clipboard-read; clipboard-write; autoplay"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-top-navigation allow-pointer-lock"
    ></iframe>
    
    <div class="top-right-blocker"></div>
    <div class="bottom-bar-blocker"></div>
  </div>

  <script>
    const iframe = document.getElementById('streamlit-frame');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('error-msg');
    
    // Quando o iframe carregar, tenta injetar CSS para forçar scroll
    iframe.addEventListener('load', () => {
      setTimeout(() => {
        loader.classList.add('hidden');
        
        // Tenta injetar CSS no iframe (funciona se same-origin ou CORS permitir)
        try {
          const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
          const style = iframeDoc.createElement('style');
          style.textContent = `
            /* Força scroll no body do Streamlit */
            .main .block-container { 
              overflow-y: auto !important; 
              max-height: none !important; 
            }
            /* Garante que o chat-container tenha scroll */
            .chat-container { 
              overflow-y: auto !important; 
              height: 60vh !important; 
            }
            /* Remove restrições de scroll do Streamlit */
            [data-testid="stVerticalBlock"] { 
              overflow: visible !important; 
            }
          `;
          iframeDoc.head.appendChild(style);
        } catch (e) {
          console.log('Não foi possível injetar CSS no iframe (CORS):', e);
        }
      }, 500);
    });
    
    // Timeout para erro
    setTimeout(() => {
      if (!loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        errorMsg.classList.add('show');
      }
    }, 12000);
    
    iframe.addEventListener('error', () => {
      loader.classList.add('hidden');
      errorMsg.classList.add('show');
    });
  </script>
</body>
</html>
