<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat com PDF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; }
    .iframe-container { position: relative; width: 100vw; height: 100vh; }
    #streamlit-frame { width: 100%; height: 100%; border: none; display: block; }
    
    /* Overlay que bloqueia o botão "Gerenciar aplicativo" */
    .button-blocker {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 220px;
      height: 45px;
      background: transparent;
      z-index: 9999;
      pointer-events: auto;
      border-radius: 6px;
    }
    
    /* Loader minimalista (sem texto) */
    .loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fff; display: flex; align-items: center; justify-content: center;
      z-index: 10000;
    }
    .loader.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e0e0e0;
      border-top-color: #28a745; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Mensagem de erro minimalista */
    .error-msg {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #ffebee; color: #c62828; padding: 12px 20px;
      border-radius: 6px; border-left: 4px solid #c62828;
      max-width: 350px; text-align: center; display: none; z-index: 10001;
      font-size: 13px;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <!-- Loader minimalista (apenas spinner, sem texto) -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>
  
  <!-- Mensagem de erro simplificada -->
  <div class="error-msg" id="error-msg">
    Não foi possível carregar.<br><small>Recarregue a página.</small>
  </div>
  
  <!-- Container com iframe + overlay -->
  <div class="iframe-container">
    <iframe 
      id="streamlit-frame" 
      src="https://iadobizurado.streamlit.app?embed=true&embed_options=disable_scrolling&embed_options=show_toolbar" 
      title="Chat com PDF"
      loading="lazy"
      allow="clipboard-read; clipboard-write"
    ></iframe>
    <!-- Overlay que bloqueia o botão "Gerenciar aplicativo" -->
    <div class="button-blocker" title="Área protegida"></div>
  </div>

  <script>
    const iframe = document.getElementById('streamlit-frame');
    const loader = document.getElementById('loader');
    const errorMsg = document.getElementById('error-msg');
    
    // Esconder loader quando iframe carregar
    iframe.addEventListener('load', () => {
      setTimeout(() => loader.classList.add('hidden'), 500);
    });
    
    // Timeout para erro
    setTimeout(() => {
      if (!loader.classList.contains('hidden')) {
        loader.classList.add('hidden');
        errorMsg.classList.add('show');
      }
    }, 12000);
    
    // Handler de erro
    iframe.addEventListener('error', () => {
      loader.classList.add('hidden');
      errorMsg.classList.add('show');
    });
    
    // Injeta CSS/JS no iframe para remover elementos do Streamlit
    function cleanStreamlitUI() {
      try {
        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
        
        // CSS para esconder elementos indesejados
        const style = iframeDoc.createElement('style');
        style.textContent = `
          /* Remove "Built with Streamlit" footer */
          footer[data-testid="stFooter"], 
          .stApp > footer,
          [data-testid="stFooter"] { display: none !important; }
          
          /* Remove botão Fullscreen */
          button[title="Fullscreen"],
          button[title="Expandir"],
          [data-testid="stToolbar"] button[aria-label*="fullscreen"],
          .stApp > div[data-testid="stToolbar"] button:last-child { display: none !important; }
          
          /* Remove barra de status inferior */
          .stStatusWidget { display: none !important; }
          
          /* Ajusta padding para ocupar tela toda */
          .stApp { padding-bottom: 0 !important; }
        `;
        iframeDoc.head.appendChild(style);
        
        // Remove elementos que já existem no DOM
        function removeElements() {
          // Footer "Built with Streamlit"
          document.querySelectorAll('footer[data-testid="stFooter"], .stApp > footer, [data-testid="stFooter"]').forEach(el => el.remove());
          // Botão Fullscreen
          document.querySelectorAll('button[title="Fullscreen"], button[title="Expandir"]').forEach(el => el.remove());
        }
        removeElements();
        
        // Observer para remover se reaparecerem
        const observer = new MutationObserver(removeElements);
        observer.observe(iframeDoc.body, { childList: true, subtree: true });
        
        console.log('✅ UI do Streamlit limpa');
      } catch (e) {
        console.log('ℹ️ Limpeza via iframe não permitida (CORS). Overlay CSS ativo.');
      }
    }
    
    // Executa após iframe carregar
    iframe.addEventListener('load', cleanStreamlitUI);
  </script>
</body>
</html>
